<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Магически Генератор на Приказки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Магически частици контейнер -->
  <div id="particles-container"></div>

  <!-- TOP FLOAT BUTTONS -->
  <div class="top-fab">
    <button id="help-btn" class="fab fab-left" type="button" aria-label="Как работи">
      ℹ️
    </button>
    <button id="key-btn" class="fab fab-right" type="button" aria-label="API ключ">
      🔑
    </button>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Заглавие</h2>
        <button id="modal-close" class="modal-close" type="button" aria-label="Затвори">✖</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Декоративни животни -->
  <div class="animal animal-1">🦊</div>
  <div class="animal animal-2">🦉</div>
  <div class="animal animal-3">🐱</div>

  <!-- Летящи звездички -->
  <div id="sparkles-container"></div>

  <!-- Основно съдържание -->
  <div class="container">
    
    <!-- Заглавие -->
    <div class="header">
      <h1 id="main-title">✨ Генератор на Приказки ✨</h1>
      <p class="subtitle">Създай своята магическа история</p>
    </div>

    <!-- Избор на жанр -->
    <div class="genre-selector">
      <button class="genre-btn active" data-genre="Приключенска" data-emoji="🗺️">
        <span class="genre-icon">🧭</span>
        <span class="genre-name">Приключенска</span>
      </button>
      <button class="genre-btn" data-genre="Фентъзи" data-emoji="✨">
        <span class="genre-icon">🪄</span>
        <span class="genre-name">Фентъзи</span>
      </button>
      <button class="genre-btn" data-genre="Мистериозна" data-emoji="🔮">
        <span class="genre-icon">🌙</span>
        <span class="genre-name">Мистериозна</span>
      </button>
      <button class="genre-btn" data-genre="Поучителна" data-emoji="💡">
        <span class="genre-icon">💡</span>
        <span class="genre-name">Поучителна</span>
      </button>
      <button class="genre-btn" data-genre="Хумористична" data-emoji="😄">
        <span class="genre-icon">😄</span>
        <span class="genre-name">Хумористична</span>
      </button>
    </div>

    <!-- Опции -->
    <div class="options-container">

      <!-- HEROES + GOAL -->
      <div class="form-row">
        <div class="form-group">
          <label>Герои:</label>

          <div class="heroes-picker">
            <select id="heroes-count" class="magic-select full-width">
              <option value="1" selected>1 герой</option>
              <option value="2">2 героя</option>
              <option value="3">3 героя</option>
              <option value="4">4 героя</option>
              <option value="5">5 героя</option>
            </select>

            <div id="heroes-inline" class="heroes-inline" style="--heroCount:1;"></div>
          </div>
        </div>

        <div class="form-group">
          <label>Основен проблем:</label>
          <input type="text" id="goal" placeholder="напр. търси съкровище" class="magic-input">
        </div>
      </div>

      <!-- AGE + LANGUAGE -->
      <div class="form-row">
        <div class="form-group">
          <label>Възраст:</label>
          <select id="age" class="magic-select">
            <option value="3-5">3–5 години</option>
            <option value="6-8">6–8 години</option>
            <option value="9-12">9–12 години</option>
            <option value="12-16">12–16 години</option>
          </select>
        </div>
        <div class="form-group">
          <label>Език:</label>
          <select id="language" class="magic-select">
            <option value="bg">Български 🇧🇬</option>
            <option value="en">English 🇬🇧</option>
          </select>
        </div>
      </div>

      <!-- LENGTH -->
      <div class="form-row">
        <div class="form-group full-width">
          <label>Дължина на приказката:</label>
          <select id="length" class="magic-select">
            <option value="3">Къса (3 абзаца) ⚡</option>
            <option value="5">Средна (5 абзаца) 📖</option>
            <option value="8">Дълга (8 абзаца) 📚</option>
          </select>
        </div>
      </div>

      <!-- MORAL -->
      <div class="form-row">
        <div class="form-group full-width">
          <label>Поука (по желание):</label>
          <input type="text" id="moral" placeholder="напр. Честността винаги помага." class="magic-input">
        </div>
      </div>

    </div>

    <!-- Бутони -->
    <div class="buttons-container">
      <button id="generate-btn" class="magic-btn primary" onclick="generate()">
        <span class="btn-icon">🪄</span>
        <span class="btn-text">Генерирай Приказка</span>
        <div class="magic-circle"></div>
      </button>
      <button id="improve-btn" class="magic-btn secondary" onclick="improve()" style="display: none;">
        <span class="btn-icon">⭐</span>
        <span class="btn-text">Подобри още</span>
      </button>
    </div>

    <!-- Резултат -->
    <div id="story-container" class="story-container" style="display: none;">
      <div class="story-header">
        <div class="story-title-wrapper">
          <span class="story-book-icon">📖</span>
          <h2>Твоята Приказка</h2>
        </div>
        <div class="audio-controls">
          <button id="read-btn" class="audio-btn" onclick="readStory()">
            🔊 Чети
          </button>
          <button id="stop-btn" class="audio-btn" onclick="stopReading()" disabled>
            ⏹ Спри
          </button>
        </div>
      </div>
      <div class="story-text-wrap">
        <pre id="result" class="story-text"></pre>
      </div>
    </div>

    <!-- История -->
    <div id="history-container" class="history-container" style="display: none;">
      <h2 class="history-title">
        <span class="sparkle-icon">✨</span>
        Предишни приказки
      </h2>
      <ul id="history" class="history-list"></ul>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
